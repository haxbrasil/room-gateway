name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 3011
      REDIS_URL: redis://127.0.0.1:6381/0
      GATEWAY_JWT_PUBLIC_KEY: gateway-jwt-secret
      GATEWAY_JWT_ALGO: HS256
      GATEWAY_JWT_ISS: haxbrasil-gateway
      GATEWAY_JWT_AUD: haxbrasil-room-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Lint
        run: pnpm exec eslint "{src,test}/**/*.ts"

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:e2e:docker
